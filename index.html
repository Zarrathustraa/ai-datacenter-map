
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRIS — AI Competitor Intelligence Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a28;
    --border: #2a2a40;
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --green: #10b981;
    --yellow: #f59e0b;
    --red: #ef4444;
    --blue: #3b82f6;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --text-dim: #64748b;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { height: 100%; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0d0d1a 0%, #12122a 100%);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 1000;
    backdrop-filter: blur(20px);
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 800;
    color: white;
    letter-spacing: -1px;
  }
  .logo-text { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .logo-sub { font-size: 11px; color: var(--text-muted); font-weight: 400; }
  .header-stats {
    display: flex;
    gap: 24px;
    align-items: center;
  }
  .stat-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stat-pill .dot { width: 6px; height: 6px; border-radius: 50%; }
  .dot-green { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot-yellow { background: var(--yellow); }
  .dot-red { background: var(--red); }
  .dot-blue { background: var(--blue); }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .btn-refresh {
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    color: white;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
    font-family: 'Inter', sans-serif;
  }
  .btn-refresh:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(108,99,255,0.4); }

  /* LAYOUT */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* SIDEBAR */
  .sidebar {
    width: 320px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }
  .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  .search-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .search-box input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    width: 100%;
  }
  .search-box input::placeholder { color: var(--text-dim); }
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Inter', sans-serif;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .company-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .company-list::-webkit-scrollbar { width: 4px; }
  .company-list::-webkit-scrollbar-track { background: transparent; }
  .company-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .company-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .company-item:hover, .company-item.selected {
    border-color: var(--accent);
    background: rgba(108,99,255,0.08);
    transform: translateX(2px);
  }
  .company-item-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .company-emoji { font-size: 20px; }
  .company-name { font-size: 13px; font-weight: 600; flex: 1; }
  .category-badge {
    font-size: 9px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .cat-orchestration { background: rgba(108,99,255,0.2); color: var(--accent2); border: 1px solid rgba(108,99,255,0.3); }
  .cat-rpa { background: rgba(59,130,246,0.2); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
  .cat-voice { background: rgba(16,185,129,0.2); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
  .cat-computer { background: rgba(245,158,11,0.2); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
  .cat-local { background: rgba(239,68,68,0.2); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
  .cat-workflow { background: rgba(236,72,153,0.2); color: #f472b6; border: 1px solid rgba(236,72,153,0.3); }
  .company-desc { font-size: 11px; color: var(--text-muted); line-height: 1.4; }
  .funding-tag { display: inline-block; font-size: 10px; color: var(--green); font-weight: 600; margin-top: 4px; }

  /* MAP */
  #map {
    flex: 1;
    background: #0d0d1a;
    height: 100%;
    min-height: 400px;
  }

  /* POPUP / CARD */
  .custom-popup .leaflet-popup-content-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    padding: 0;
    min-width: 340px;
    max-width: 400px;
  }
  .custom-popup .leaflet-popup-tip-container { display: none; }
  .custom-popup .leaflet-popup-content { margin: 0; width: 100% !important; }
  .popup-card { padding: 20px; }
  .popup-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 14px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .popup-logo {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
  }
  .popup-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .popup-tagline { font-size: 12px; color: var(--text-muted); line-height: 1.4; }
  .popup-meta { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .meta-chip {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 6px;
    font-weight: 600;
  }
  .chip-stage { background: rgba(108,99,255,0.15); color: var(--accent2); }
  .chip-founded { background: rgba(100,116,139,0.15); color: var(--text-muted); }
  .chip-hq { background: rgba(16,185,129,0.15); color: #34d399; }
  .popup-section { margin-bottom: 12px; }
  .popup-section-title {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .popup-section-content { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
  .product-list { display: flex; flex-direction: column; gap: 4px; }
  .product-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 11px;
  }
  .product-name { font-weight: 600; color: var(--text); }
  .product-desc { color: var(--text-muted); }
  .funding-row {
    background: rgba(16,185,129,0.08);
    border: 1px solid rgba(16,185,129,0.2);
    border-radius: 8px;
    padding: 8px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .funding-amount { font-size: 16px; font-weight: 700; color: var(--green); }
  .funding-details { font-size: 11px; color: var(--text-muted); }
  .popup-links { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .popup-link {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
    text-decoration: none;
    transition: all 0.15s;
  }
  .popup-link:hover { border-color: var(--accent); color: var(--accent2); }
  .popup-link.primary {
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    border-color: transparent;
    color: white;
  }
  .popup-link.primary:hover { opacity: 0.9; }

  /* CUSTOM MARKERS */
  .custom-marker {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    border: 2px solid rgba(255,255,255,0.2);
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  }
  .custom-marker:hover { transform: scale(1.2); z-index: 1000 !important; }
  .marker-orchestration { background: linear-gradient(135deg, #6c63ff, #8b5cf6); }
  .marker-rpa { background: linear-gradient(135deg, #3b82f6, #2563eb); }
  .marker-voice { background: linear-gradient(135deg, #10b981, #059669); }
  .marker-computer { background: linear-gradient(135deg, #f59e0b, #d97706); }
  .marker-local { background: linear-gradient(135deg, #ef4444, #dc2626); }
  .marker-workflow { background: linear-gradient(135deg, #ec4899, #db2777); }

  /* LEGEND */
  .map-legend {
    position: absolute;
    bottom: 30px;
    right: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    z-index: 999;
    min-width: 180px;
  }
  .legend-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 10px; }
  .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12px; color: var(--text-muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* DETAIL PANEL */
  .detail-panel {
    position: absolute;
    top: 80px;
    right: 10px;
    width: 380px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    z-index: 998;
    display: none;
    max-height: calc(100vh - 120px);
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  .detail-panel.visible { display: block; }
  .detail-panel::-webkit-scrollbar { width: 4px; }
  .detail-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .panel-close {
    position: absolute;
    top: 14px;
    right: 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 14px;
    color: var(--text-muted);
    transition: all 0.15s;
  }
  .panel-close:hover { color: var(--text); border-color: var(--accent); }

  /* TOOLTIP */
  .leaflet-tooltip {
    background: var(--surface2) !important;
    border: 1px solid var(--border) !important;
    border-radius: 8px !important;
    color: var(--text) !important;
    font-family: 'Inter', sans-serif !important;
    font-size: 12px !important;
    padding: 6px 10px !important;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
  }
  .leaflet-tooltip::before { display: none !important; }

  /* Leaflet overrides */
  .leaflet-container { background: #0d0d1a !important; }
  .leaflet-control-zoom a {
    background: var(--surface) !important;
    color: var(--text) !important;
    border-color: var(--border) !important;
  }
  .leaflet-control-zoom a:hover { background: var(--surface2) !important; }
  .leaflet-control-attribution {
    background: rgba(10,10,15,0.8) !important;
    color: var(--text-dim) !important;
    font-size: 10px !important;
  }
  .leaflet-control-attribution a { color: var(--text-dim) !important; }

  /* IRIS badge */
  .iris-badge {
    position: absolute;
    top: 80px;
    left: 330px;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    border-radius: 12px;
    padding: 10px 16px;
    z-index: 999;
    font-size: 12px;
    font-weight: 600;
    box-shadow: 0 4px 20px rgba(108,99,255,0.4);
  }
  .iris-badge span { display: block; font-size: 10px; font-weight: 400; opacity: 0.8; margin-top: 2px; }

  /* Responsive */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .iris-badge { left: 10px; }
    .detail-panel { width: calc(100vw - 20px); right: 10px; }
  }

  /* Loading */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    flex-direction: column;
    gap: 16px;
    transition: opacity 0.5s;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 48px;
    height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--text-muted); font-size: 14px; }

  /* Count badge */
  .count-badge {
    background: var(--accent);
    color: white;
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 11px;
    font-weight: 700;
    margin-left: 6px;
  }
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-overlay" id="loading">
  <div style="font-size:32px;font-weight:800;background:linear-gradient(135deg,#6c63ff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent">IRIS</div>
  <div class="spinner"></div>
  <div class="loading-text">Loading competitor intelligence...</div>
</div>

<!-- Header -->
<header>

    <div class="logo-icon">IR</div>

  </div>

    <div class="stat-pill"><div class="dot dot-blue"></div>6 Categories</div>
    <div class="stat-pill" style="color:var(--text-dim);font-size:11px">Updated Jan 2025</div>
  </div>
  <div class="header-right">
    <button class="btn-refresh" onclick="refreshData()">⟳ Refresh Data</button>
  </div>
</header>

<!-- Main -->
<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="search-box">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="color:var(--text-dim)"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search-input" placeholder="Search companies..." oninput="filterCompanies()">
      </div>
      <div class="filter-row">
        <button class="filter-btn active" onclick="setFilter('all', this)">All</button>

        <button class="filter-btn" onclick="setFilter('workflow', this)">Workflow</button>
        <button class="filter-btn" onclick="setFilter('rpa', this)">RPA+AI</button>
        <button class="filter-btn" onclick="setFilter('voice', this)">Voice</button>
        <button class="filter-btn" onclick="setFilter('computer', this)">Computer</button>
        <button class="filter-btn" onclick="setFilter('local', this)">Local AI</button>
      </div>
    </div>
    <div class="company-list" id="company-list"></div>
  </div>

  <!-- Map -->
  <div style="position:relative;flex:1">
    <div id="map"></div>

    <!-- IRIS Badge -->
    <div class="iris-badge">
      🚀 IRIS Platform
      <span>Rochester, NY · You are here</span>
    </div>

    <!-- Legend -->
    <div class="map-legend">
      <div class="legend-title">Categories</div>
      <div class="legend-item"><div class="legend-dot" style="background:#6c63ff"></div>Orchestration</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ec4899"></div>Workflow</div>
      <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>RPA + AI</div>
      <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div>Voice-First</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>Computer-Use</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>Local AI</div>
    </div>

    <!-- Detail Panel -->
    <div class="detail-panel" id="detail-panel">
      <div class="panel-close" onclick="closePanel()">✕</div>
      <div id="detail-content"></div>
    </div>
  </div>
</div>

let map, activeFilter = 'all', markers = [], selectedMarker = null;

function getCategoryClass(cat) {
  const map = { orchestration: 'cat-orchestration', rpa: 'cat-rpa', voice: 'cat-voice', computer: 'cat-computer', local: 'cat-local', workflow: 'cat-workflow' };
  return map[cat] || 'cat-orchestration';
}

function getCategoryLabel(cat) {
  const labels = { orchestration: 'Orchestration', rpa: 'RPA+AI', voice: 'Voice', computer: 'Computer-Use', local: 'Local AI', workflow: 'Workflow' };
  return labels[cat] || cat;
}

function getMarkerClass(cat) {
  return `custom-marker marker-${cat}`;
}

function initMap() {
  map = L.map('map', {
    center: [30, 10],
    zoom: 2,
    zoomControl: true,
    attributionControl: true
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 20
  }).addTo(map);

  renderMarkers();
  renderSidebar();

  // Add IRIS marker
  const irisIcon = L.divIcon({
    html: `<div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#6c63ff,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:18px;border:3px solid rgba(255,255,255,0.5);box-shadow:0 0 20px rgba(108,99,255,0.8),0 4px 15px rgba(0,0,0,0.5);animation:pulse 2s infinite;">🚀</div>`,
    className: '',
    iconSize: [44, 44],
    iconAnchor: [22, 22]
  });

  const style = document.createElement('style');
  style.textContent = '@keyframes pulse { 0%,100%{box-shadow:0 0 20px rgba(108,99,255,0.8)} 50%{box-shadow:0 0 40px rgba(108,99,255,1)} }';
  document.head.appendChild(style);

  L.marker([43.1566, -77.6088], { icon: irisIcon })
    .addTo(map)
    .bindTooltip('<strong>IRIS</strong><br>Rochester, NY · Your Platform', { permanent: false, direction: 'top' });
}

function createMarkerIcon(company) {
  return L.divIcon({
    html: `<div class="${getMarkerClass(company.category)}" title="${company.name}">${company.emoji}</div>`,
    className: '',
    iconSize: [36, 36],
    iconAnchor: [18, 18]
  });
}

function renderMarkers() {
  markers.forEach(m => m.remove());
  markers = [];

  const filtered = COMPANIES.filter(c => activeFilter === 'all' || c.category === activeFilter);

  filtered.forEach(company => {
    const icon = createMarkerIcon(company);
    const marker = L.marker([company.lat, company.lng], { icon })
      .addTo(map)
      .bindTooltip(`<strong>${company.emoji} ${company.name}</strong><br>${company.tagline}`, { direction: 'top', offset: [0, -20] })
      .on('click', () => showDetail(company));
    markers.push(marker);
  });

  document.getElementById('total-count').textContent = COMPANIES.length;
  document.getElementById('funded-count').textContent = COMPANIES.filter(c => c.funding.total && c.funding.total !== '$' && c.funding.total !== 'N/A (Microsoft)' && c.funding.total !== 'N/A (Google)' && c.funding.total !== 'N/A (Amazon)' && c.funding.total !== 'N/A (ByteDance)').length;
}

function renderSidebar() {
  const list = document.getElementById('company-list');
  const search = document.getElementById('search-input').value.toLowerCase();
  const filtered = COMPANIES.filter(c => {
    const matchFilter = activeFilter === 'all' || c.category === activeFilter;
    const matchSearch = !search || c.name.toLowerCase().includes(search) || c.tagline.toLowerCase().includes(search);
    return matchFilter && matchSearch;
  });

  list.innerHTML = filtered.map(c => `
    <div class="company-item" onclick="flyToCompany(${c.id})" id="item-${c.id}">
      <div class="company-item-header">
        <span class="company-emoji">${c.emoji}</span>
        <span class="company-name">${c.name}</span>
        <span class="category-badge ${getCategoryClass(c.category)}">${getCategoryLabel(c.category)}</span>
      </div>
      <div class="company-desc">${c.tagline}</div>
      ${c.funding.total && c.funding.total !== '$' ? `<div class="funding-tag">💰 ${c.funding.total} · ${c.funding.round}</div>` : '' }
    </div>
  `).join('');
}

function flyToCompany(id) {
  const company = COMPANIES.find(c => c.id === id);
  if (!company) return;

  document.querySelectorAll('.company-item').forEach(el => el.classList.remove('selected'));
  const item = document.getElementById(`item-${id}`);
  if (item) item.classList.add('selected');

  map.flyTo([company.lat, company.lng], 5, { duration: 1.2 });
  setTimeout(() => showDetail(company), 800);
}

function showDetail(company) {
  const panel = document.getElementById('detail-panel');
  const content = document.getElementById('detail-content');

  const hasFunding = company.funding.total && company.funding.total !== '$';

  content.innerHTML = `
    <div style="margin-bottom:16px">
      <div style="display:flex;align-items:flex-start;gap:14px;margin-bottom:12px">
        <div class="popup-logo">${company.emoji}</div>
        <div style="flex:1">
          <div style="font-size:18px;font-weight:700;margin-bottom:4px">${company.name}</div>
          <div style="font-size:12px;color:var(--text-muted);line-height:1.4">${company.tagline}</div>
          <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
            <span class="meta-chip chip-stage">${company.stage}</span>
            <span class="meta-chip chip-founded">Founded ${company.founded}</span>
            <span class="meta-chip chip-hq">📍 ${company.hq}</span>
          </div>
        </div>
      </div>
      <span class="category-badge ${getCategoryClass(company.category)}" style="font-size:11px">${getCategoryLabel(company.category)}</span>
    </div>

    ${hasFunding ? `
    <div class="popup-section">
      <div class="popup-section-title">💰 Funding</div>
      <div class="funding-row">
        <div>
          <div class="funding-amount">${company.funding.total}</div>
          <div class="funding-details">${company.funding.round} · ${company.funding.date}</div>
        </div>
        <div style="text-align:right;font-size:11px;color:var(--text-muted)">${company.funding.investors}</div>
      </div>
    </div>
    ` : '' }

    <div class="popup-section">
      <div class="popup-section-title">🚀 Products</div>
      <div class="product-list">
        ${company.products.map(p => `
          <div class="product-item">
            <div class="product-name">${p.name}</div>
            <div class="product-desc">${p.desc}</div>
          </div>
        `).join('')}
      </div>
    </div>

    ${company.news ? `
    <div class="popup-section">
      <div class="popup-section-title">📰 Latest News</div>
      <div style="background:rgba(108,99,255,0.08);border:1px solid rgba(108,99,255,0.2);border-radius:8px;padding:10px;font-size:12px;color:var(--text-muted);line-height:1.5">${company.news}</div>
    </div>
    ` : '' }

    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">
      <a href="${company.website}" target="_blank" rel="noopener" class="popup-link primary">🌐 Website</a>
      ${company.github ? `<a href="${company.github}" target="_blank" rel="noopener" class="popup-link">⭐ GitHub</a>` : '' }
      <a href="https://www.crunchbase.com/organization/${company.name.toLowerCase().split(' ').join('-').split('(').join('').split(')').join('')}" target="_blank" rel="noopener" class="popup-link">📊 Crunchbase</a>
    </div>
  `;

  panel.classList.add('visible');
}

function closePanel() {
  document.getElementById('detail-panel').classList.remove('visible');
  document.querySelectorAll('.company-item').forEach(el => el.classList.remove('selected'));
}

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMarkers();
  renderSidebar();
}

function filterCompanies() {
  renderSidebar();
}

function refreshData() {
  const btn = document.querySelector('.btn-refresh');
  btn.textContent = '⟳ Refreshing...';
  btn.disabled = true;
  setTimeout(() => {
    btn.textContent = '⟳ Refresh Data';
    btn.disabled = false;
    alert('Data is up to date! (Jan 2025)\n\nTo pull live data, run:\n  python refresh_data.py');
  }, 1500);
}

// Init
document.addEventListener('DOMContentLoaded', () => {
  initMap();
  // Ensure map renders correctly after layout settles
  setTimeout(() => { if(map) map.invalidateSize(); }, 300);
  setTimeout(() => {
    const loading = document.getElementById('loading');
    loading.classList.add('hidden');
    setTimeout(() => loading.remove(), 500);
  }, 1200);
});
</script>
