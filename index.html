const STATUS_COLORS = {
  construction: '#ecc94b',
  announced: '#9acd32',
  operational: '#48bb78',
  expanding: '#63b3ed'
};

const STATUS_LABELS = {
  construction: 'Under Construction',
  announced: 'Announced / Planned',
  operational: 'Recently Operational',
  expanding: 'Expanding'
};

let map, markers = [], markerLayer;

function createMarkerIcon(color, size = 16) {
  const pulse = color === '#ecc94b' ? 'pulse-ring' : '';
  return L.divIcon({
    className: '',
    html: `<div style="
      width: ${size}px; height: ${size}px;
      background: ${color};
      border: 2.5px solid rgba(255,255,255,0.8);
      border-radius: 50%;
      box-shadow: 0 0 10px ${color}88, 0 2px 8px rgba(0,0,0,0.4);
    " class="${pulse}"></div>`,
    iconSize: [size, size],
    iconAnchor: [size/2, size/2]
  });
}

function buildPopup(dc) {
  const color = STATUS_COLORS[dc.status];
  const badgeClass = 'badge-' + dc.status;
  return `
    <div class="popup-inner">
      <div class="popup-header">
        <div>
          <div class="popup-title">${dc.name}</div>
          <div class="popup-operator">${dc.operator}</div>
        </div>
      </div>
      <span class="popup-badge ${badgeClass}">${STATUS_LABELS[dc.status]}</span>
      <div class="popup-grid">
        <div class="popup-field"><div class="popup-field-label">√∞¬ü¬ì¬ç Location</div><div class="popup-field-value">${dc.location}</div></div>
        <div class="popup-field"><div class="popup-field-label">√¢¬ö¬° Power</div><div class="popup-field-value">${dc.power}</div></div>
        <div class="popup-field"><div class="popup-field-label">√∞¬ü¬í¬∞ Investment</div><div class="popup-field-value">${dc.investment}</div></div>
        <div class="popup-field"><div class="popup-field-label">√∞¬ü¬ñ¬•√Ø¬∏¬è GPUs / Compute</div><div class="popup-field-value">${dc.gpus}</div></div>
        <div class="popup-field" style="grid-column: 1/-1"><div class="popup-field-label">√∞¬ü¬ì¬Ö Timeline</div><div class="popup-field-value">${dc.timeline}</div></div>
      </div>
      <div class="popup-desc">${dc.description}</div>
      <div class="popup-source">√∞¬ü¬î¬ó Source: <a href="${dc.source_url}" target="_blank" rel="noopener">${dc.source_label}</a></div>
    </div>
  `;
}

function initMap() {
  map = L.map('map', {
    center: [30, 10],
    zoom: 2.5,
    zoomControl: true,
    attributionControl: true
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  DATA_CENTERS.forEach(dc => {
    const color = STATUS_COLORS[dc.status];
    const marker = L.marker([dc.lat, dc.lng], {
      icon: createMarkerIcon(color)
    });
    marker.bindPopup(buildPopup(dc), { maxWidth: 380, className: '' });
    marker.bindTooltip(`<strong>${dc.name}</strong><br>${dc.operator}<br><em>${STATUS_LABELS[dc.status]}</em>`, {
      direction: 'top', offset: [0, -10],
      className: 'leaflet-tooltip'
    });
    marker.dcData = dc;
    markers.push(marker);
    marker.addTo(map);
  });

  // Update stats
  document.getElementById('total-count').textContent = DATA_CENTERS.length;
  document.getElementById('total-power').textContent = '8+';
  document.getElementById('total-invest').textContent = '$200B+';
}

function filterBy(group, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  markers.forEach(m => {
    const dc = m.dcData;
    const show = group === 'all' || dc.group === group;
    if (show) {
      if (!map.hasLayer(m)) m.addTo(map);
    } else {
      if (map.hasLayer(m)) map.removeLayer(m);
    }
  });
}

document.addEventListener('DOMContentLoaded', initMap);
</script>
