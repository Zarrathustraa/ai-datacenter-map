<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRIS — AI Competitor Intelligence Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a28;
    --border: #2a2a40;
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --green: #10b981;
    --yellow: #f59e0b;
    --red: #ef4444;
    --blue: #3b82f6;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --text-dim: #64748b;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { height: 100%; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0d0d1a 0%, #12122a 100%);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 1000;
    backdrop-filter: blur(20px);
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 800; color: white;
    box-shadow: 0 0 20px rgba(108,99,255,0.4);
  }
  .logo-text { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
  .logo-sub { font-size: 11px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; }
  .header-actions { display: flex; gap: 10px; align-items: center; }
  .btn {
    padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500;
    cursor: pointer; border: none; transition: all 0.2s; font-family: inherit;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #7c73ff; transform: translateY(-1px); }
  .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-compare {
    background: linear-gradient(135deg, #f59e0b, #ef4444);
    color: white; position: relative;
  }
  .btn-compare:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-compare .compare-badge {
    position: absolute; top: -6px; right: -6px;
    background: white; color: #ef4444;
    border-radius: 50%; width: 18px; height: 18px;
    font-size: 10px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-refresh { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
  .btn-refresh:hover { background: var(--surface2); color: var(--text); }

  /* LAYOUT */
  .app-body { display: flex; flex: 1; overflow: hidden; min-height: 0; }

  /* SIDEBAR */
  .sidebar {
    width: 300px; flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .search-box {
    width: 100%; padding: 9px 12px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 13px; font-family: inherit;
    outline: none;
  }
  .search-box:focus { border-color: var(--accent); }
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .filter-btn {
    padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: 500;
    cursor: pointer; border: 1px solid var(--border);
    background: transparent; color: var(--text-muted); font-family: inherit;
    transition: all 0.2s; white-space: nowrap;
  }
  .filter-btn:hover { background: var(--surface2); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .sidebar-list { flex: 1; overflow-y: auto; padding: 8px; }
  .sidebar-list::-webkit-scrollbar { width: 4px; }
  .sidebar-list::-webkit-scrollbar-track { background: transparent; }
  .sidebar-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .company-item {
    padding: 10px 12px; border-radius: 8px; cursor: pointer;
    border: 1px solid transparent; margin-bottom: 4px;
    transition: all 0.15s; display: flex; align-items: center; gap: 10px;
  }
  .company-item:hover { background: var(--surface2); border-color: var(--border); }
  .company-item.selected { background: rgba(108,99,255,0.12); border-color: var(--accent); }
  .company-item.in-compare { background: rgba(245,158,11,0.1); border-color: var(--yellow); }
  .company-logo-sm {
    width: 28px; height: 28px; border-radius: 6px;
    overflow: hidden; flex-shrink: 0;
    background: var(--surface2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
  }
  .company-logo-sm img { width: 100%; height: 100%; object-fit: contain; }
  .company-logo-sm .letter-avatar {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: white;
  }
  .company-info { flex: 1; min-width: 0; }
  .company-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .company-meta { font-size: 11px; color: var(--text-muted); }
  .company-cat-dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  }
  .compare-check {
    width: 18px; height: 18px; border-radius: 4px;
    border: 1px solid var(--border); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; transition: all 0.15s;
  }
  .compare-check.checked { background: var(--yellow); border-color: var(--yellow); color: white; }

  /* MAP */
  .map-container { flex: 1; position: relative; min-width: 0; }
  #map { width: 100%; height: 100%; position: absolute; top: 0; left: 0; right: 0; bottom: 0; }

  /* TIMELINE SLIDER */
  .timeline-bar {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(18,18,26,0.95); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 20px;
    z-index: 500; min-width: 380px; max-width: 600px; width: 60%;
    backdrop-filter: blur(20px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .timeline-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .timeline-title { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
  .timeline-value { font-size: 13px; font-weight: 700; color: var(--accent2); }
  .timeline-slider {
    width: 100%; -webkit-appearance: none; appearance: none;
    height: 4px; border-radius: 2px;
    background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--pct, 100%), var(--border) var(--pct, 100%), var(--border) 100%);
    outline: none; cursor: pointer;
  }
  .timeline-slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--accent2); border: 2px solid white;
    cursor: pointer; box-shadow: 0 0 8px rgba(108,99,255,0.6);
  }
  .timeline-labels { display: flex; justify-content: space-between; margin-top: 4px; }
  .timeline-label { font-size: 10px; color: var(--text-dim); }

  /* MAP CONTROLS */
  .map-controls {
    position: absolute; top: 16px; right: 16px;
    display: flex; flex-direction: column; gap: 8px; z-index: 500;
  }
  .map-control-btn {
    width: 36px; height: 36px; border-radius: 8px;
    background: rgba(18,18,26,0.9); border: 1px solid var(--border);
    color: var(--text-muted); cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; backdrop-filter: blur(10px);
  }
  .map-control-btn:hover { background: var(--surface2); color: var(--text); }

  /* STATS BAR */
  .stats-bar {
    position: absolute; top: 16px; left: 16px;
    display: flex; gap: 8px; z-index: 500;
  }
  .stat-chip {
    background: rgba(18,18,26,0.9); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 12px;
    font-size: 12px; backdrop-filter: blur(10px);
    display: flex; align-items: center; gap: 6px;
  }
  .stat-chip strong { color: var(--accent2); }

  /* DETAIL PANEL */
  .detail-panel {
    position: absolute; right: 0; top: 0; bottom: 0;
    width: 360px; background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 600; transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    overflow-y: auto; overflow-x: hidden;
    display: flex; flex-direction: column;
  }
  .detail-panel.visible { transform: translateX(0); }
  .detail-panel::-webkit-scrollbar { width: 4px; }
  .detail-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; gap: 14px;
    position: sticky; top: 0; background: var(--surface); z-index: 1;
  }
  .panel-logo {
    width: 52px; height: 52px; border-radius: 12px;
    overflow: hidden; flex-shrink: 0;
    background: var(--surface2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
  }
  .panel-logo img { width: 100%; height: 100%; object-fit: contain; }
  .panel-logo .letter-avatar {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 800; color: white;
  }
  .panel-title-area { flex: 1; }
  .panel-name { font-size: 18px; font-weight: 700; }
  .panel-tagline { font-size: 12px; color: var(--text-muted); margin-top: 4px; line-height: 1.4; }
  .panel-close {
    width: 28px; height: 28px; border-radius: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-muted); cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
  }
  .panel-close:hover { background: var(--red); color: white; border-color: var(--red); }
  .panel-body { padding: 16px 20px; flex: 1; }
  .popup-section { margin-bottom: 18px; }
  .popup-section-title {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1px; color: var(--text-dim); margin-bottom: 8px;
  }
  .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .meta-item {
    background: var(--surface2); border-radius: 8px; padding: 10px 12px;
    border: 1px solid var(--border);
  }
  .meta-label { font-size: 10px; color: var(--text-dim); margin-bottom: 3px; }
  .meta-value { font-size: 13px; font-weight: 600; }
  .stage-badge {
    display: inline-block; padding: 3px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 600;
  }
  .funding-row {
    background: var(--surface2); border-radius: 8px; padding: 12px;
    border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
  }
  .funding-amount { font-size: 20px; font-weight: 800; color: var(--green); }
  .funding-details { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .product-list { display: flex; flex-direction: column; gap: 6px; }
  .product-item {
    background: var(--surface2); border-radius: 8px; padding: 10px 12px;
    border: 1px solid var(--border);
  }
  .product-name { font-size: 13px; font-weight: 600; }
  .product-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .popup-link {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 6px 12px; border-radius: 6px;
    font-size: 12px; font-weight: 500; text-decoration: none;
    border: 1px solid var(--border); color: var(--text-muted);
    background: var(--surface2); transition: all 0.2s;
  }
  .popup-link:hover { background: var(--surface); color: var(--text); border-color: var(--text-dim); }
  .popup-link.primary { background: var(--accent); color: white; border-color: var(--accent); }
  .popup-link.primary:hover { background: #7c73ff; }
  .add-to-compare-btn {
    width: 100%; padding: 10px; border-radius: 8px;
    background: linear-gradient(135deg, rgba(245,158,11,0.15), rgba(239,68,68,0.15));
    border: 1px solid rgba(245,158,11,0.4);
    color: var(--yellow); font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: inherit; transition: all 0.2s;
    margin-top: 12px;
  }
  .add-to-compare-btn:hover { background: linear-gradient(135deg, rgba(245,158,11,0.25), rgba(239,68,68,0.25)); }
  .add-to-compare-btn.remove { color: var(--red); border-color: rgba(239,68,68,0.4);
    background: rgba(239,68,68,0.1); }

  /* COMPARE PANEL */
  .compare-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 2000; display: none; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .compare-overlay.visible { display: flex; }
  .compare-modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; width: 95vw; max-width: 1400px;
    max-height: 90vh; overflow: hidden;
    display: flex; flex-direction: column;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
  }
  .compare-modal-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .compare-modal-title { font-size: 18px; font-weight: 700; }
  .compare-modal-body {
    flex: 1; overflow-x: auto; overflow-y: auto;
    padding: 20px 24px;
  }
  .compare-grid {
    display: grid; gap: 16px;
    grid-template-columns: repeat(var(--cols, 2), 1fr);
    min-width: 0;
  }
  .compare-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; min-width: 220px;
  }
  .compare-card-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
    padding-bottom: 16px; border-bottom: 1px solid var(--border);
  }
  .compare-card-logo {
    width: 44px; height: 44px; border-radius: 10px;
    overflow: hidden; flex-shrink: 0;
    background: var(--surface); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
  }
  .compare-card-logo img { width: 100%; height: 100%; object-fit: contain; }
  .compare-card-logo .letter-avatar {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 800; color: white;
  }
  .compare-card-name { font-size: 15px; font-weight: 700; }
  .compare-card-stage { font-size: 11px; color: var(--text-muted); }
  .compare-row {
    display: flex; flex-direction: column; gap: 10px;
  }
  .compare-field {
    background: var(--surface); border-radius: 8px; padding: 10px 12px;
    border: 1px solid var(--border);
  }
  .compare-field-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .compare-field-value { font-size: 13px; font-weight: 600; }
  .compare-field-value.green { color: var(--green); }
  .compare-field-value.yellow { color: var(--yellow); }
  .compare-field-value.blue { color: var(--blue); }

  /* WHAT CHANGED PANEL */
  .delta-panel {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(18,18,26,0.97); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 20px;
    z-index: 500; width: 480px;
    backdrop-filter: blur(20px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    display: none;
  }
  .delta-panel.visible { display: block; }
  .delta-panel-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px;
  }
  .delta-panel-title { font-size: 14px; font-weight: 700; }
  .delta-panel-close {
    width: 24px; height: 24px; border-radius: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-muted); cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
  }
  .delta-panel-close:hover { background: var(--red); color: white; }
  .delta-section { margin-bottom: 14px; }
  .delta-section-title {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1px; color: var(--text-dim); margin-bottom: 8px;
    padding-bottom: 6px; border-bottom: 1px solid var(--border);
  }
  .delta-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 8px; margin-bottom: 4px;
    background: var(--surface2); border: 1px solid var(--border);
  }
  .delta-logo {
    width: 24px; height: 24px; border-radius: 5px;
    overflow: hidden; flex-shrink: 0;
    background: var(--surface); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
  }
  .delta-logo img { width: 100%; height: 100%; object-fit: contain; }
  .delta-logo .letter-avatar {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: white;
  }
  .delta-company { font-size: 12px; font-weight: 600; flex: 1; }
  .delta-change { font-size: 12px; font-weight: 600; }
  .delta-change.up { color: var(--green); }
  .delta-change.down { color: var(--red); }
  .delta-change.new { color: var(--accent2); }

  /* COMPANY LOGO MARKER */
  .logo-marker {
    width: 36px; height: 36px; border-radius: 50%;
    border: 2px solid white;
    overflow: hidden; background: white;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    cursor: pointer; transition: transform 0.15s;
  }
  .logo-marker:hover { transform: scale(1.15); }
  .logo-marker img { width: 100%; height: 100%; object-fit: contain; }
  .logo-marker .letter-avatar {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 800; color: white;
  }

  /* LOADING */
  .loading {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999; flex-direction: column; gap: 16px;
    transition: opacity 0.5s;
  }
  .loading.hidden { opacity: 0; pointer-events: none; }
  .loading-spinner {
    width: 40px; height: 40px; border-radius: 50%;
    border: 3px solid var(--border); border-top-color: var(--accent);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: var(--text-muted); }

  /* CATEGORY COLORS */
  .cat-orchestration { color: #6c63ff; }
  .cat-workflow { color: #10b981; }
  .cat-rpa { color: #f59e0b; }
  .cat-voice { color: #3b82f6; }
  .cat-data { color: #ec4899; }
  .cat-infrastructure { color: #14b8a6; }
  .cat-vertical { color: #f97316; }

  .dot-orchestration { background: #6c63ff; }
  .dot-workflow { background: #10b981; }
  .dot-rpa { background: #f59e0b; }
  .dot-voice { background: #3b82f6; }
  .dot-data { background: #ec4899; }
  .dot-infrastructure { background: #14b8a6; }
  .dot-vertical { background: #f97316; }

  /* LEAFLET CUSTOM */
  .leaflet-container { background: #0d0d1a !important; }
  .leaflet-popup-content-wrapper {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .leaflet-popup-tip { background: var(--surface2); }
  .leaflet-popup-content { margin: 12px 14px; font-family: 'Inter', sans-serif; }
  .leaflet-popup-close-button { color: var(--text-muted) !important; }
  .leaflet-popup-close-button:hover { color: var(--text) !important; }
  .lp-name { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
  .lp-cat { font-size: 11px; color: var(--text-muted); }
  .lp-funding { font-size: 13px; font-weight: 600; color: var(--green); margin-top: 6px; }
  .lp-btn {
    display: inline-block; margin-top: 8px; padding: 6px 12px;
    background: var(--accent); color: white; border-radius: 6px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    border: none; font-family: inherit;
  }
  .lp-btn:hover { background: #7c73ff; }

  /* TOOLTIP */
  .tooltip {
    position: absolute; background: rgba(18,18,26,0.95);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 10px; font-size: 12px; pointer-events: none;
    z-index: 9999; white-space: nowrap; display: none;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>

<body>
<div class="loading" id="loading">

    </div>

</div>

// ===================== LOGO SYSTEM =====================
const LOGO_CACHE = {};

function getDomain(url) {
  try {
    const u = new URL(url);
    return u.hostname.replace(/^www\./, '');
  } catch(e) { return null; }
}

function getLogoUrl(company, size) {
  const sz = size || 64;
  if (!company.website) return null;
  const domain = getDomain(company.website);
  if (!domain) return null;
  // Primary: Clearbit
  return 'https://logo.clearbit.com/' + domain + '?size=' + sz;
}

function getFaviconUrl(company) {
  if (!company.website) return null;
  const domain = getDomain(company.website);
  if (!domain) return null;
  return 'https://www.google.com/s2/favicons?domain=' + domain + '&sz=64';
}

const CAT_COLORS = {
  orchestration: '#6c63ff',
  workflow: '#10b981',
  rpa: '#f59e0b',
  voice: '#3b82f6',
  data: '#ec4899',
  infrastructure: '#14b8a6',
  vertical: '#f97316'
};

function getCatColor(cat) {
  return CAT_COLORS[cat] || '#6c63ff';
}

function getInitial(name) {
  return (name || '?')[0].toUpperCase();
}

// Build a logo img element with multi-level fallback
function buildLogoImg(company, size, className) {
  const sz = size || 32;
  const logoUrl = getLogoUrl(company, sz);
  const faviconUrl = getFaviconUrl(company);
  const color = getCatColor(company.category);
  const initial = getInitial(company.name);

  if (logoUrl) {
    return `<img src="${logoUrl}" class="${className || ''}" alt="${company.name}" width="${sz}" height="${sz}"
      onerror="this.onerror=null;this.src='${faviconUrl}';this.onerror=function(){this.style.display='none';this.parentNode.innerHTML='<div class=\'letter-avatar\' style=\'background:${color}\'>${initial}</div>';}">`;
  }
  return `<div class="letter-avatar" style="background:${color}">${initial}</div>`;
}

// ===================== DELTA PANEL =====================
function renderDeltaPanel() {
  const body = document.getElementById('deltaPanelBody');
  if (!body) return;

  function renderDeltaSection(title, items) {
    const rows = items.map(function(item) {
      const c = getCompanyById(item.id);
      if (!c) return '';
      const logoUrl = getLogoUrl(c, 24);
      const faviconUrl = getFaviconUrl(c);
      const color = getCatColor(c.category);
      const initial = getInitial(c.name);
      let logoHtml;
      if (logoUrl) {
        logoHtml = `<img src="${logoUrl}" width="24" height="24" style="width:100%;height:100%;object-fit:contain"
          onerror="this.onerror=null;this.src='${faviconUrl}';this.onerror=function(){this.style.display='none';this.parentNode.innerHTML='<div class=\'letter-avatar\' style=\'background:${color};font-size:9px\' >${initial}</div>';}">`;
      } else {
        logoHtml = `<div class="letter-avatar" style="background:${color};font-size:9px">${initial}</div>`;
      }
      return `<div class="delta-item" onclick="selectCompany(${c.id})" style="cursor:pointer">
        <div class="delta-logo">${logoHtml}</div>
        <span class="delta-company">${c.name}</span>
        <span class="delta-change ${item.direction}">${item.change}</span>
      </div>`;
    }).join('');
    return `<div class="delta-section">
      <div class="delta-section-title">${title}</div>
      ${rows}
    </div>`;
  }

  body.innerHTML =
    renderDeltaSection('&#x1F4B0; New Funding Rounds', WEEKLY_DELTAS.funding) +
    renderDeltaSection('&#x1F680; Product Releases', WEEKLY_DELTAS.products) +
    renderDeltaSection('&#x2B50; GitHub Star Changes', WEEKLY_DELTAS.github);
}

function toggleDeltaPanel() {
  deltaPanelVisible = !deltaPanelVisible;
  const panel = document.getElementById('deltaPanel');
  if (deltaPanelVisible) {
    panel.classList.add('visible');
    renderDeltaPanel();
  } else {
    panel.classList.remove('visible');
  }
}

function toggleCompare(id) {
  if (compareSet.has(id)) {
    compareSet.delete(id);
  } else {
    if (compareSet.size >= 5) {
      alert('Maximum 5 companies for comparison');
      return;
    }
    compareSet.add(id);
  }
  updateCompareUI();
}

function updateCompareUI() {
  const count = compareSet.size;
  const badge = document.getElementById('compareBadge');
  const btn = document.getElementById('compareBtn');
  const stat = document.getElementById('compareModeStat');
  if (badge) badge.textContent = count;
  if (btn) btn.style.display = count > 0 ? 'inline-flex' : 'none';
  if (stat) stat.style.display = count > 0 ? 'flex' : 'none';
  renderSidebarList();
  updateDetailPanelCompareBtn();
}

function updateDetailPanelCompareBtn() {
  const btn = document.getElementById('detailCompareBtn');
  if (!btn || !selectedCompanyId) return;
  const inCompare = compareSet.has(selectedCompanyId);
  btn.textContent = inCompare ? '− Remove from Compare' : '+ Add to Compare';
  btn.className = 'add-to-compare-btn' + (inCompare ? ' remove' : '');
}

function openCompareModal() {
  if (compareSet.size < 2) {
    alert('Select at least 2 companies to compare');
    return;
  }
  renderCompareGrid();
  document.getElementById('compareOverlay').classList.add('visible');
}

function closeCompareModal(e) {
  if (!e || e.target === document.getElementById('compareOverlay')) {
    document.getElementById('compareOverlay').classList.remove('visible');
  }
}

function clearCompare() {
  compareSet.clear();
  updateCompareUI();
  closeCompareModal();
}

        onerror="this.onerror=null;this.src='${faviconUrl}';this.onerror=function(){this.style.display='none';this.parentNode.innerHTML='<div class=\'letter-avatar\' style=\'background:${color}\' >${initial}</div>';}">`;
    } else {
      logoHtml = `<div class="letter-avatar" style="background:${color}">${initial}</div>`;
    }

    const products = (c.products || []).slice(0, 3).map(function(p) {
      return `<div style="font-size:11px;color:var(--text-muted);margin-top:3px">&#x2022; ${p.name}</div>`;
    }).join('');

    const stageColor = c.stage && c.stage.includes('Public') ? 'var(--green)' :
      c.stage && c.stage.includes('Series') ? 'var(--blue)' :
      c.stage === 'Profitable' ? 'var(--green)' : 'var(--yellow)';

    return `<div class="compare-card">
      <div class="compare-card-header">
        <div class="compare-card-logo">${logoHtml}</div>
        <div>
          <div class="compare-card-name">${c.name}</div>
          <div class="compare-card-stage" style="color:${stageColor}">${c.stage || 'Unknown'}</div>
        </div>
      </div>
      <div class="compare-row">
        <div class="compare-field">
          <div class="compare-field-label">Category</div>
          <div class="compare-field-value" style="color:${color}">${c.category}</div>
        </div>
        <div class="compare-field">
          <div class="compare-field-label">Founded</div>
          <div class="compare-field-value">${c.founded || 'N/A'}</div>
        </div>
        <div class="compare-field">
          <div class="compare-field-label">Total Funding</div>
          <div class="compare-field-value green">${c.funding ? c.funding.total : 'N/A'}</div>
        </div>
        <div class="compare-field">
          <div class="compare-field-label">Stage</div>
          <div class="compare-field-value" style="color:${stageColor}">${c.stage || 'N/A'}</div>
        </div>
        <div class="compare-field">
          <div class="compare-field-label">Headquarters</div>
          <div class="compare-field-value">${c.hq || 'N/A'}</div>
        </div>
        <div class="compare-field">
          <div class="compare-field-label">Latest Round</div>
          <div class="compare-field-value yellow">${c.funding ? (c.funding.round + '  ' + (c.funding.date || '')) : 'N/A'}</div>
        </div>
        <div class="compare-field">
          <div class="compare-field-label">Investors</div>
          <div class="compare-field-value" style="font-size:12px;font-weight:500">${c.funding ? (c.funding.investors || 'N/A') : 'N/A'}</div>
        </div>
        <div class="compare-field">
          <div class="compare-field-label">Key Products</div>
          <div class="compare-field-value" style="font-size:12px;font-weight:400">${products}</div>
        </div>
        <div class="compare-field">
          <div class="compare-field-label">Latest News</div>
          <div class="compare-field-value" style="font-size:11px;font-weight:400;color:var(--text-muted);line-height:1.4">${c.news || 'N/A'}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ===================== TIMELINE =====================
function onTimelineChange(val) {
  timelineYear = parseInt(val, 10);
  document.getElementById('timelineValue').textContent = timelineYear === 2025 ? 'All' : '≤ ' + timelineYear;
  const min = 2001, max = 2025;
  const pct = ((timelineYear - min) / (max - min) * 100).toFixed(1) + '%';
  document.getElementById('timelineSlider').style.setProperty('--pct', pct);
  updateMapMarkers();
  renderSidebarList();
}

// ===================== FILTER / SEARCH =====================
function setCategoryFilter(btn, cat) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  updateMapMarkers();
  renderSidebarList();
}

function filterCompanies() {
  searchQuery = document.getElementById('searchBox').value.toLowerCase();
  updateMapMarkers();
  renderSidebarList();
}

function getVisibleCompanies() {
  return COMPANIES.filter(function(c) {
    if (activeFilter !== 'all' && c.category !== activeFilter) return false;
    if (timelineYear < 2025 && c.founded && c.founded > timelineYear) return false;
    if (searchQuery) {
      const q = searchQuery;
      if (c.name.toLowerCase().indexOf(q) === -1 &&
          (c.tagline || '').toLowerCase().indexOf(q) === -1 &&
          (c.category || '').toLowerCase().indexOf(q) === -1 &&
          (c.hq || '').toLowerCase().indexOf(q) === -1) return false;
    }
    return true;
  });
}

// ===================== SIDEBAR =====================
function renderSidebarList() {
  const list = document.getElementById('sidebarList');
  if (!list) return;
  const visible = getVisibleCompanies();

  list.innerHTML = visible.map(function(c) {
    const isSelected = selectedCompanyId === c.id;
    const inCompare = compareSet.has(c.id);
    const logoUrl = getLogoUrl(c, 28);
    const faviconUrl = getFaviconUrl(c);
    const color = getCatColor(c.category);
    const initial = getInitial(c.name);
    let logoHtml;
    if (logoUrl) {
      logoHtml = `<img src="${logoUrl}" width="28" height="28" style="width:100%;height:100%;object-fit:contain"
        onerror="this.onerror=null;this.src='${faviconUrl}';this.onerror=function(){this.style.display='none';this.parentNode.innerHTML='<div class=\'letter-avatar\' style=\'background:${color}\' >${initial}</div>';}">`;
    } else {
      logoHtml = `<div class="letter-avatar" style="background:${color}">${initial}</div>`;
    }

    return `<div class="company-item ${isSelected ? 'selected' : ''}${inCompare ? ' in-compare' : ''}" onclick="selectCompany(${c.id})">
      <div class="company-logo-sm">${logoHtml}</div>
      <div class="company-info">
        <div class="company-name">${c.name}</div>
        <div class="company-meta">${c.stage || ''}${c.hq ? ' · ' + c.hq.split(',')[0] : '' }</div>
      </div>
      <div class="company-cat-dot dot-${c.category}"></div>
      <div class="compare-check ${inCompare ? 'checked' : ''}" onclick="event.stopPropagation();toggleCompare(${c.id})">
        ${inCompare ? '✓' : '+'}
      </div>
    </div>`;
  }).join('');

  // Update stats
  document.getElementById('statCount').textContent = visible.length;
  let totalFunding = 0;
  visible.forEach(function(c) {
    if (c.funding && c.funding.total) {
      const t = c.funding.total;
      const m = t.match(/\$([\d.]+)([BMK]?)/);
      if (m) {
        let v = parseFloat(m[1]);
        if (m[2] === 'B') v *= 1000;
        else if (m[2] === 'K') v /= 1000;
        totalFunding += v;
      }
    }
  });
  const fStr = totalFunding >= 1000 ? '$' + (totalFunding/1000).toFixed(1) + 'B' : '$' + Math.round(totalFunding) + 'M';
  document.getElementById('statFunding').textContent = fStr;
}

// ===================== MAP MARKERS =====================
function updateMapMarkers() {
  if (!map) return;
  const visible = getVisibleCompanies();
  const visibleIds = new Set(visible.map(function(c) { return c.id; }));

  // Remove hidden markers
  Object.keys(markers).forEach(function(id) {
    const numId = parseInt(id, 10);
    if (!visibleIds.has(numId)) {
      map.removeLayer(markers[id]);
      delete markers[id];
    }
  });

  // Add/update visible markers
  visible.forEach(function(c) {
    if (!markers[c.id]) {
      addMarker(c);
    }
  });
}

function addMarker(c) {
  const color = getCatColor(c.category);
  const initial = getInitial(c.name);
  const logoUrl = getLogoUrl(c, 36);
  const faviconUrl = getFaviconUrl(c);

  let imgTag;
  if (logoUrl) {
    imgTag = `<img src="${logoUrl}" style="width:100%;height:100%;object-fit:contain"
      onerror="this.onerror=null;this.src='${faviconUrl}';this.onerror=function(){this.style.display='none';this.parentNode.style.background='${color}';this.parentNode.innerHTML='<div class=\'letter-avatar\' style=\'width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:white\'>${initial}</div>';}">`;
  } else {
    imgTag = `<div class="letter-avatar" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:white;background:${color}">${initial}</div>`;
  }

  const iconHtml = `<div class="logo-marker" style="border-color:${color}">${imgTag}</div>`;

  const icon = L.divIcon({
    html: iconHtml,
    className: '',
    iconSize: [36, 36],
    iconAnchor: [18, 18],
    popupAnchor: [0, -20]
  });

  const marker = L.marker([c.lat, c.lng], { icon: icon });

  marker.bindPopup(function() {
    return `<div class="lp-name">${c.name}</div>
      <div class="lp-cat" style="color:${color}">${c.category}</div>
      <div class="lp-funding">${c.funding ? c.funding.total : 'N/A'}</div>
      <button class="lp-btn" onclick="selectCompany(${c.id})">View Details &#x2192;</button>`;
  }, { maxWidth: 220 });

  marker.on('click', function() {
    selectCompany(c.id);
  });

  marker.addTo(map);
  markers[c.id] = marker;
}

// ===================== DETAIL PANEL =====================
function selectCompany(id) {
  selectedCompanyId = id;
  const c = getCompanyById(id);
  if (!c) return;

  // Pan map
  if (map && markers[id]) {
    map.setView([c.lat, c.lng], Math.max(map.getZoom(), 5), { animate: true });
  }

  // Highlight sidebar
  renderSidebarList();

  // Render detail panel
  renderDetailPanel(c);
  document.getElementById('detailPanel').classList.add('visible');
}

function renderDetailPanel(c) {
  const color = getCatColor(c.category);
  const initial = getInitial(c.name);
  const logoUrl = getLogoUrl(c, 52);
  const faviconUrl = getFaviconUrl(c);
  const inCompare = compareSet.has(c.id);

  let logoHtml;
  if (logoUrl) {
    logoHtml = `<img src="${logoUrl}" width="52" height="52" style="width:100%;height:100%;object-fit:contain"
      onerror="this.onerror=null;this.src='${faviconUrl}';this.onerror=function(){this.style.display='none';this.parentNode.innerHTML='<div class=\'letter-avatar\' style=\'background:${color}\' >${initial}</div>';}">`;
  } else {
    logoHtml = `<div class="letter-avatar" style="background:${color}">${initial}</div>`;
  }

  const stageColor = c.stage && c.stage.includes('Public') ? 'var(--green)' :
    c.stage && c.stage.includes('Series') ? 'var(--blue)' :
    c.stage === 'Profitable' ? 'var(--green)' : 'var(--yellow)';

  const products = (c.products || []).map(function(p) {
    return `<div class="product-item">
      <div class="product-name">${p.name}</div>
      <div class="product-desc">${p.desc}</div>
    </div>`;
  }).join('');

  const links = [];
  if (c.website) links.push(`<a href="${c.website}" target="_blank" class="popup-link primary">&#x1F310; Website</a>`);
  if (c.github) links.push(`<a href="${c.github}" target="_blank" class="popup-link">&#x1F4BB; GitHub</a>`);

  document.getElementById('detailPanelContent').innerHTML = `
    <div class="panel-header">
      <div class="panel-logo">${logoHtml}</div>
      <div class="panel-title-area">
        <div class="panel-name">${c.name}</div>
        <div class="panel-tagline">${c.tagline || '' }</div>
      </div>
      <button class="panel-close" onclick="closeDetailPanel()">&#x2715;</button>
    </div>
    <div class="panel-body">
      <div class="popup-section">
        <div class="popup-section-title">Overview</div>
        <div class="meta-grid">
          <div class="meta-item">
            <div class="meta-label">Founded</div>
            <div class="meta-value">${c.founded || 'N/A'}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Stage</div>
            <div class="meta-value" style="color:${stageColor}">${c.stage || 'N/A'}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Category</div>
            <div class="meta-value" style="color:${color}">${c.category}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">HQ</div>
            <div class="meta-value" style="font-size:12px">${c.hq || 'N/A'}</div>
          </div>
        </div>
      </div>

      <div class="popup-section">
        <div class="popup-section-title">Funding</div>
        <div class="funding-row">
          <div>
            <div class="funding-amount">${c.funding ? c.funding.total : 'N/A'}</div>
            <div class="funding-details">${c.funding ? (c.funding.round + (c.funding.date ? ' · ' + c.funding.date : '')) : '' }</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:12px;color:var(--text-muted)">Investors</div>
            <div style="font-size:12px;font-weight:600;max-width:140px;text-align:right">${c.funding ? (c.funding.investors || 'N/A') : 'N/A'}</div>
          </div>
        </div>
      </div>

      <div class="popup-section">
        <div class="popup-section-title">Products</div>
        <div class="product-list">${products}</div>
      </div>

      <div class="popup-section">
        <div class="popup-section-title">Latest News</div>
        <div style="font-size:13px;color:var(--text-muted);line-height:1.5">${c.news || 'No recent news'}</div>
      </div>

      <div class="popup-section">
        <div class="popup-section-title">Links</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">${links.join('')}</div>
      </div>

      <button class="add-to-compare-btn ${inCompare ? 'remove' : ''}" id="detailCompareBtn"
        onclick="toggleCompare(${c.id});updateDetailPanelCompareBtn()">
        ${inCompare ? '− Remove from Compare' : '+ Add to Compare'}
      </button>
    </div>
  `;
}

function closeDetailPanel() {
  document.getElementById('detailPanel').classList.remove('visible');
  selectedCompanyId = null;
  renderSidebarList();
}

// ===================== MAP INIT =====================
function initMap() {
  map = L.map('map', {
    center: [30, 10],
    zoom: 3,
    zoomControl: false,
    attributionControl: false
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CartoDB',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  L.control.zoom({ position: 'bottomright' }).addTo(map);

  // Add all markers
  COMPANIES.forEach(function(c) { addMarker(c); });

  // Fix container sizing
  setTimeout(function() {
    map.invalidateSize();
  }, 300);

  // ResizeObserver for reliable sizing
  if (typeof ResizeObserver !== 'undefined') {
    const ro = new ResizeObserver(function() {
      if (map) map.invalidateSize();
    });
    ro.observe(document.getElementById('mapContainer'));
  }
}

function resetView() {
  if (map) map.setView([30, 10], 3, { animate: true });
  closeDetailPanel();
}

// ===================== INIT =====================
document.addEventListener('DOMContentLoaded', function() {
  initMap();
  renderSidebarList();

  // Hide loading
  setTimeout(function() {
    const loading = document.getElementById('loading');
    if (loading) {
      loading.classList.add('hidden');
      setTimeout(function() { loading.style.display = 'none'; }, 500);
    }
  }, 800);
});
</script>
